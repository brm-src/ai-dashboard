name: Probe AI APIs

on:
  schedule:
    - cron: '0 * * * *'    # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run probe
        env:
          XIAOMI_API_KEY: ${{ secrets.XIAOMI_API_KEY }}
          NOUS_PORTAL_API_KEY: ${{ secrets.NOUS_PORTAL_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          PIONEER_API_KEY: ${{ secrets.PIONEER_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          B_AI_API_KEY: ${{ secrets.B_AI_API_KEY }}
        run: python scripts/probe_apis.py

      - name: Telegram alert
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SUMMARY=$(python3 -c "
          import json
          d = json.load(open('data/latest.json'))
          s = d['summary']
          failed = [a['name'] for a in d['apis'] if a['status'] != 'ok']
          print(f\"{s['apis_ok']}/{s['total_apis']} OK | {s['total_models']} models\")
          if failed:
              print('Down: ' + ', '.join(failed))
          ")
          OK=$(python3 -c "import json; print(json.load(open('data/latest.json'))['summary']['apis_ok'])")
          if [ "$OK" -lt 5 ]; then
            MSG="AI Dashboard Alert"$'\n'"$SUMMARY"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="${MSG}" \
              -d parse_mode=""
          fi

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "probe: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
