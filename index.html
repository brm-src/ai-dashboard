<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Control Center</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#08080a;--surface:#0f0f12;--border:#1a1a1f;--border-light:#252530;
    --text:#e4e4e7;--muted:#71717a;--dim:#3f3f46;
    --green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;
    --purple:#a78bfa;--cyan:#06b6d4;
    --font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif;
    --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
    --radius:12px;
  }
  html{font-size:15px}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:2rem;max-width:1200px;margin:0 auto}
  a{color:var(--purple);text-decoration:none}

  /* ── Header ── */
  header{margin-bottom:2.5rem}
  h1{font-size:1.6rem;font-weight:600;letter-spacing:-.02em;margin-bottom:.3rem}
  h1 span{color:var(--muted);font-weight:400}
  .subtitle{color:var(--muted);font-size:.85rem;font-family:var(--mono)}

  /* ── Summary Bar ── */
  .summary{display:flex;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.4rem;min-width:140px}
  .stat-value{font-size:1.8rem;font-weight:700;font-family:var(--mono);line-height:1}
  .stat-label{color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;margin-top:.4rem}
  .stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.purple{color:var(--purple)}

  /* ── Grid ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1rem;margin-bottom:2.5rem}

  /* ── Card ── */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.4rem;transition:border-color .2s;position:relative;overflow:hidden}
  .card:hover{border-color:var(--border-light)}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
  .card.ok::before{background:var(--green)}.card.error::before{background:var(--red)}
  .card.warning::before{background:var(--yellow)}.card.off::before{background:var(--dim)}

  .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.8rem}
  .card-name{font-weight:600;font-size:.95rem}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px;margin-left:8px}
  .status-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
  .status-dot.error{background:var(--red);box-shadow:0 0 6px var(--red)}
  .status-dot.warning{background:var(--yellow);box-shadow:0 0 6px var(--yellow)}
  .status-dot.off{background:var(--dim)}

  .card-meta{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:.6rem}
  .badge{font-size:.7rem;padding:.15rem .5rem;border-radius:6px;font-family:var(--mono);font-weight:500}
  .badge.primary{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.2)}
  .badge.fallback{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
  .badge.free{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.15)}
  .badge.paid{background:rgba(234,179,8,.1);color:var(--yellow);border:1px solid rgba(234,179,8,.15)}

  .card-stats{display:flex;gap:1.2rem;font-size:.8rem;color:var(--muted)}
  .card-stats span{font-family:var(--mono)}
  .card-stats .val{color:var(--text);font-weight:500}

  .card-error{color:var(--red);font-size:.75rem;margin-top:.4rem;font-family:var(--mono);opacity:.8}

  /* ── History ── */
  .history-section{margin-top:1rem}
  .history-section h2{font-size:1.1rem;font-weight:600;margin-bottom:1rem;color:var(--muted)}
  .timeline{display:flex;gap:3px;align-items:end;height:48px}
  .timeline-bar{flex:1;min-width:4px;max-width:12px;border-radius:2px 2px 0 0;transition:height .3s;cursor:default;position:relative}
  .timeline-bar.ok{background:var(--green)}.timeline-bar.partial{background:var(--yellow)}.timeline-bar.bad{background:var(--red)}.timeline-bar.none{background:var(--dim)}
  .timeline-bar:hover{opacity:.7}
  .timeline-bar::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:.3rem .5rem;border-radius:6px;font-size:.65rem;white-space:nowrap;opacity:0;pointer-events:none;font-family:var(--mono);transition:opacity .15s}
  .timeline-bar:hover::after{opacity:1}
  .history-labels{display:flex;justify-content:space-between;font-size:.65rem;color:var(--dim);margin-top:.3rem;font-family:var(--mono)}

  /* ── Footer ── */
  footer{margin-top:3rem;color:var(--dim);font-size:.75rem;display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem}

  /* ── Loading ── */
  .loading{text-align:center;padding:4rem;color:var(--muted)}
  .loading::after{content:'';display:inline-block;width:1.2rem;height:1.2rem;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .6s linear infinite;margin-left:.5rem;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── Refresh btn ── */
  .refresh{background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:8px;font-size:.75rem;cursor:pointer;font-family:var(--mono);transition:all .15s}
  .refresh:hover{border-color:var(--purple);color:var(--purple)}

  @media(max-width:640px){
    body{padding:1rem}
    .summary{gap:.8rem}
    .stat{min-width:100px;padding:.8rem 1rem}
    .stat-value{font-size:1.4rem}
    .grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem">
    <div>
      <h1>AI Control Center <span>v1</span></h1>
      <div class="subtitle" id="timestamp">loading...</div>
    </div>
    <button class="refresh" onclick="loadData()">refresh</button>
  </div>
</header>

<div class="summary" id="summary"></div>
<div class="grid" id="grid"><div class="loading">probing APIs</div></div>

<div class="history-section" id="history-section">
  <h2>Uptime (last 7 days)</h2>
  <div class="timeline" id="timeline"></div>
  <div class="history-labels"><span>7 days ago</span><span>now</span></div>
</div>

<footer>
  <span>auto-refreshes every 6h via GitHub Actions</span>
  <span id="footer-meta"></span>
</footer>

<script>
const STATUS_MAP = {
  ok:         { cls:'ok',      dot:'ok',      label:'Online' },
  auth_error: { cls:'error',   dot:'error',   label:'Auth Error' },
  down:       { cls:'error',   dot:'error',   label:'Down' },
  offline:    { cls:'off',     dot:'off',     label:'Offline' },
  no_key:     { cls:'off',     dot:'off',     label:'No Key' },
  timeout:    { cls:'warning', dot:'warning', label:'Timeout' },
  rate_limited:{cls:'warning', dot:'warning', label:'Rate Limited' },
  error:      { cls:'error',   dot:'error',   label:'Error' },
};

function renderSummary(s) {
  const el = document.getElementById('summary');
  el.innerHTML = `
    <div class="stat"><div class="stat-value green">${s.apis_ok}</div><div class="stat-label">APIs Online</div></div>
    <div class="stat"><div class="stat-value red">${s.apis_down}</div><div class="stat-label">Down / Error</div></div>
    <div class="stat"><div class="stat-value purple">${s.total_models.toLocaleString()}</div><div class="stat-label">Total Models</div></div>
    <div class="stat"><div class="stat-value">${s.total_apis}</div><div class="stat-label">Configured</div></div>
  `;
}

function renderCards(apis) {
  const el = document.getElementById('grid');
  el.innerHTML = apis.map(a => {
    const sm = STATUS_MAP[a.status] || STATUS_MAP.error;
    const tierBadge = a.tier === 'primary'
      ? '<span class="badge primary">primary</span>'
      : '<span class="badge fallback">fallback</span>';
    const priceBadge = (a.pricing && a.pricing.input === 0)
      ? '<span class="badge free">free</span>'
      : (a.pricing && a.pricing.input != null)
        ? `<span class="badge paid">$${a.pricing.input}/$${a.pricing.output} per 1M</span>`
        : '';
    const errHtml = a.error ? `<div class="card-error">${a.error}</div>` : '';
    return `
      <div class="card ${sm.cls}">
        <div class="card-header">
          <div class="card-name">${a.name}</div>
          <div class="status-dot ${sm.dot}" title="${sm.label}"></div>
        </div>
        <div class="card-meta">${tierBadge}${priceBadge}</div>
        <div class="card-stats">
          <div>models <span class="val">${a.model_count}</span></div>
          <div>latency <span class="val">${a.response_ms != null ? a.response_ms + 'ms' : '—'}</span></div>
          <div>HTTP <span class="val">${a.http_code || '—'}</span></div>
        </div>
        ${errHtml}
      </div>
    `;
  }).join('');
}

async function loadHistory() {
  const el = document.getElementById('timeline');
  try {
    // Try to load last 7 days of history
    const now = new Date();
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      days.push(d.toISOString().split('T')[0]);
    }

    let allEntries = [];
    for (const day of days) {
      try {
        const r = await fetch(`data/history/${day}.json`);
        if (r.ok) {
          const entries = await r.json();
          allEntries = allEntries.concat(entries);
        }
      } catch {}
    }

    if (allEntries.length === 0) {
      el.innerHTML = '<div style="color:var(--dim);font-size:.8rem">No history data yet — will populate after first GitHub Actions run</div>';
      return;
    }

    // Sample entries (max 28 bars = 4 per day * 7 days)
    const sampled = allEntries.length > 28
      ? allEntries.filter((_, i) => i % Math.ceil(allEntries.length / 28) === 0).slice(-28)
      : allEntries;

    const maxApis = Math.max(...sampled.map(e => e.summary.total_apis));

    el.innerHTML = sampled.map(e => {
      const ratio = e.summary.apis_ok / maxApis;
      const cls = ratio >= 0.8 ? 'ok' : ratio >= 0.5 ? 'partial' : 'bad';
      const h = Math.max(4, ratio * 48);
      const time = new Date(e.timestamp).toLocaleString('en', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      return `<div class="timeline-bar ${cls}" style="height:${h}px" data-tip="${time}: ${e.summary.apis_ok}/${e.summary.total_apis} OK"></div>`;
    }).join('');
  } catch {
    el.innerHTML = '<div style="color:var(--dim);font-size:.8rem">History unavailable</div>';
  }
}

async function loadData() {
  try {
    const r = await fetch('data/latest.json');
    if (!r.ok) throw new Error('No data');
    const d = await r.json();

    document.getElementById('timestamp').textContent =
      new Date(d.timestamp).toLocaleString('en', {
        weekday:'short', month:'short', day:'numeric',
        hour:'2-digit', minute:'2-digit', timeZoneName:'short'
      });

    renderSummary(d.summary);
    renderCards(d.apis);

    const avgLatency = Math.round(
      d.apis.filter(a => a.response_ms).reduce((s, a) => s + a.response_ms, 0) /
      d.apis.filter(a => a.response_ms).length
    );
    document.getElementById('footer-meta').textContent =
      `avg latency: ${avgLatency}ms · probed ${d.apis.length} endpoints`;

    loadHistory();
  } catch {
    document.getElementById('grid').innerHTML =
      '<div style="text-align:center;padding:3rem;color:var(--muted)">No data yet. Run <code style="color:var(--purple)">python3 scripts/probe_apis.py</code> or wait for the first cron job.</div>';
    document.getElementById('timestamp').textContent = 'no data';
  }
}

loadData();
// Auto-refresh every 5 minutes (in case tab stays open)
setInterval(loadData, 300000);
</script>
</body>
</html>
